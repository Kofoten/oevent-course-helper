name: Test Runner

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: oevent-course-helper-arc-runner

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Restore Dependencies
        run: dotnet restore

      - name: Validate licenses
        run: dotnet run --project ./GenerateThirdPartyNotices/GenerateThirdPartyNotices.csproj -- ./OEventCourseHelper/obj/project.assets.json ./ThirdPartyNotices.txt ./Licenses

      - name: Build
        run: dotnet build --no-restore

      - name: Run Tests
        run: dotnet test --no-build --verbosity normal
